name: Build & Push HRM

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build backend
        run: docker build -t dodinhtrung/hrm-backend:latest ./HumanResourceManagement/HumanResourceManagement

      - name: Push backend
        run: docker push dodinhtrung/hrm-backend:latest

      - name: Build frontend
        run: docker build -t dodinhtrung/hrm-frontend:latest ./HumanResourceManagementFE/HRM_FE

      - name: Push frontend
        run: docker push dodinhtrung/hrm-frontend:latest
