name: Build and Deploy (Health Check Ready)

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  RESOURCE_GROUP: hrm-deha-resource

  BACKEND_APP: hrm-deha
  FRONTEND_APP: hrm-fe-deha

  BACKEND_URL: https://hrm-deha-cjhwf4c0egg0feg2.malaysiawest-01.azurewebsites.net
  FRONTEND_URL: https://hrm-fe-deha-gwdqenfph5f2ewb9.malaysiawest-01.azurewebsites.net

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          az acr login --name $(echo $ACR_LOGIN_SERVER | cut -d'.' -f1)

      - name: Build & Push Backend
        run: |
          docker build -t $ACR_LOGIN_SERVER/backend:${{ github.sha }} ./HumanResourceManagement/HumanResourceManagement
          docker push $ACR_LOGIN_SERVER/backend:${{ github.sha }}

      - name: Build & Push Frontend
        run: |
          docker build -t $ACR_LOGIN_SERVER/frontend:${{ github.sha }} ./HumanResourceManagementFE/HRM_FE
          docker push $ACR_LOGIN_SERVER/frontend:${{ github.sha }}

      - name: Deploy Backend
        run: |
          az webapp config container set \
            --name $BACKEND_APP \
            --resource-group $RESOURCE_GROUP \
            --container-image-name $ACR_LOGIN_SERVER/backend:${{ github.sha }} \
            --container-registry-url https://$ACR_LOGIN_SERVER

      - name: Health Check Backend
        run: |
          echo "Checking backend..."
          for i in {1..12}; do
            if curl -fsS $BACKEND_URL/actuator/health | grep '"status":"UP"'; then
              echo "Backend OK"
              exit 0
            fi
            echo "Retry $i..."
            sleep 5
          done
          echo "Backend failed"
          exit 1

      - name: Deploy Frontend
        run: |
          az webapp config container set \
            --name $FRONTEND_APP \
            --resource-group $RESOURCE_GROUP \
            --container-image-name $ACR_LOGIN_SERVER/frontend:${{ github.sha }} \
            --container-registry-url https://$ACR_LOGIN_SERVER

      - name: Health Check Frontend
        run: |
          echo "Checking frontend..."
          for i in {1..10}; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" $FRONTEND_URL)
            if [ "$STATUS" = "200" ]; then
              echo "Frontend OK"
              exit 0
            fi
            echo "Retry $i - status: $STATUS"
            sleep 5
          done
          echo "Frontend failed"
          exit 1
