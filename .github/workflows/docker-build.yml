name: Build and Deploy to Azure

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  RESOURCE_GROUP: hrm-deha-resource
  BACKEND_APP: hrm-deha
  FRONTEND_APP: hrm-fe-deha

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure (OIDC with Managed Identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          echo ${{ secrets.ACR_PASSWORD }} | docker login $ACR_LOGIN_SERVER \
            -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build & Push Backend Image
        run: |
          docker build -t $ACR_LOGIN_SERVER/backend:${{ github.sha }} ./HumanResourceManagement/HumanResourceManagement
          docker push $ACR_LOGIN_SERVER/backend:${{ github.sha }}

      - name: Deploy Backend to Web App
        run: |
          az webapp config container set \
            --name $BACKEND_APP \
            --resource-group $RESOURCE_GROUP \
            --docker-custom-image-name $ACR_LOGIN_SERVER/backend:${{ github.sha }} \
            --docker-registry-server-url https://$ACR_LOGIN_SERVER

      - name: Restart Backend
        run: |
          az webapp restart \
            --name $BACKEND_APP \
            --resource-group $RESOURCE_GROUP

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure (OIDC with Managed Identity)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          echo ${{ secrets.ACR_PASSWORD }} | docker login $ACR_LOGIN_SERVER \
            -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build & Push Frontend Image
        run: |
          docker build -t $ACR_LOGIN_SERVER/frontend:${{ github.sha }} ./HumanResourceManagementFE/HRM_FE
          docker push $ACR_LOGIN_SERVER/frontend:${{ github.sha }}

      - name: Deploy Frontend to Web App
        run: |
          az webapp config container set \
            --name $FRONTEND_APP \
            --resource-group $RESOURCE_GROUP \
            --docker-custom-image-name $ACR_LOGIN_SERVER/frontend:${{ github.sha }} \
            --docker-registry-server-url https://$ACR_LOGIN_SERVER

      - name: Restart Frontend
        run: |
          az webapp restart \
            --name $FRONTEND_APP \
            --resource-group $RESOURCE_GROUP
