server:
  port: 8081
app:
  frontend:
    url: ${FRONTEND_URL}
  mail:
    from: ${MAIL_FROM}
    fail-fast: ${MAIL_FAIL_FAST:false}
    async:
      core-pool-size: ${MAIL_ASYNC_CORE_POOL_SIZE:2}
      max-pool-size: ${MAIL_ASYNC_MAX_POOL_SIZE:8}
      queue-capacity: ${MAIL_ASYNC_QUEUE_CAPACITY:200}
  sendgrid:
    api-key: ${SENDGRID_API_KEY}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  cookie:
    secure: ${COOKIE_SECURE:false}
  oauth2:
    redirect-uri: ${REDIRECT_URI}
    exchange-code-ttl-ms: ${OAUTH2_EXCHANGE_CODE_TTL_MS:60000}

cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME}
  api_key: ${CLOUDINARY_API_KEY}
  api_secret: ${CLOUDINARY_API_SECRET}
management:
  endpoint:
    web:
      exposure:
        include: health
    health:
      show-details:  always
spring:
  application:
    name: HumanResourceManagement
  profiles:
    active: prod
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
#  mail:
#    host: smtp.gmail.com
#    port: 587
#    username: ${MAIL_USERNAME}
#    password: ${MAIL_PASSWORD}
#    properties:
#      mail:
#        smtp:
#          auth: true
#          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:10000}
#          timeout: ${MAIL_SMTP_TIMEOUT:20000}
#          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:20000}
#          quitwait: false
#          starttls:
#            enable: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:HRM}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
    ignore-migration-patterns: "*:missing"

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 3MB

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    docExpansion: none