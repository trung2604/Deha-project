<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mã OTP đặt lại mật khẩu</title>
</head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:Arial,sans-serif">
<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center" style="padding:40px 16px">
            <table width="600" cellpadding="0" cellspacing="0"
                   style="background:#ffffff;border-radius:8px;overflow:hidden;
                      box-shadow:0 2px 8px rgba(0,0,0,0.08)">

                <!-- Header -->
                <tr>
                    <td style="background:#0F6E56;padding:32px 40px">
                        <h1 style="margin:0;color:#ffffff;font-size:22px;font-weight:600">
                            HRM System
                        </h1>
                    </td>
                </tr>

                <!-- Body -->
                <tr>
                    <td style="padding:40px">
                        <h2 style="margin:0 0 16px;color:#1a1a1a;font-size:18px;font-weight:600">
                            Đặt lại mật khẩu
                        </h2>
                        <p style="margin:0 0 24px;color:#444;line-height:1.7">
                            Chúng tôi nhận được yêu cầu đặt lại mật khẩu cho tài khoản
                            <strong th:text="${email}">email@company.com</strong>.
                            Mã OTP của bạn là:
                        </p>

                        <!-- OTP Box -->
                        <table cellpadding="0" cellspacing="0" style="margin:0 auto 24px">
                            <tr>
                                <td style="background:#f0faf6;border:2px dashed #0F6E56;
                             border-radius:8px;padding:20px 40px;text-align:center">
                    <span th:text="${otp}"
                          style="font-size:40px;font-weight:700;
                                 letter-spacing:12px;color:#0F6E56;
                                 font-family:monospace">
                      000000
                    </span>
                                </td>
                            </tr>
                        </table>

                        <p style="margin:0;color:#444;line-height:1.7;text-align:center">
                            Mã có hiệu lực trong
                            <strong style="color:#0F6E56">5 phút</strong>.
                        </p>
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td style="background:#f9f9f9;padding:24px 40px;
                       border-top:1px solid #eeeeee">
                        <p style="margin:0;color:#aaa;font-size:12px;line-height:1.6">
                            Nếu bạn không yêu cầu đặt lại mật khẩu, hãy bỏ qua email này.
                            Tài khoản của bạn vẫn an toàn.
                        </p>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>
</body>
</html>
