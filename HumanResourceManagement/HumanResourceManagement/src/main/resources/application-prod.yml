server:
  ssl:
    enabled: false
  http2:
    enabled: false
  port: 8080
#  forward-headers-strategy: native

app:
  frontend:
    url: ${FRONTEND_URL}
  mail:
    from: ${MAIL_FROM}
    fail-fast: ${MAIL_FAIL_FAST:false}
    async:
      core-pool-size: ${MAIL_ASYNC_CORE_POOL_SIZE:2}
      max-pool-size: ${MAIL_ASYNC_MAX_POOL_SIZE:8}
      queue-capacity: ${MAIL_ASYNC_QUEUE_CAPACITY:200}
  sendgrid:
    api-key: ${SENDGRID_API_KEY}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  cookie:
    secure: ${COOKIE_SECURE:true}
  oauth2:
    redirect-uri: ${REDIRECT_URI}
    exchange-code-ttl-ms: ${OAUTH2_EXCHANGE_CODE_TTL_MS:60000}

cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME}
  api_key: ${CLOUDINARY_API_KEY}
  api_secret: ${CLOUDINARY_API_SECRET}

spring:
  application:
    name: HumanResourceManagement

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

#  mail:
#    host: smtp.sendgrid.net
#    port: 587
#    username: apikey
#    password: ${SENDGRID_API_KEY}
#    properties:
#      mail:
#        smtp:
#          auth: true
#          starttls:
#            enable: true
#          connectiontimeout: 10000
#          timeout: 20000
#          writetimeout: 20000

  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:HRM}}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
    ignore-migration-patterns: "*:missing"

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 3MB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha
    docExpansion: none

logging:
  level:
    root: WARN
    com.deha.HumanResourceManagement: INFO
    org.springframework.security: WARN
  file:
    name: /app/logs/hrm-application.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"