app:
  frontend:
    url: http://localhost:5173
  mail:
    from: noreply@test.local
    fail-fast: false
  jwt:
    secret: test-secret-key-for-context-load-only
    expiration-ms: 3600000
    refresh-expiration-ms: 86400000
  cors:
    allowed-origins: "*"
  cookie:
    secure: false
  oauth2:
    redirect-uri: http://localhost:5173/auth/callback
    exchange-code-ttl-ms: 60000

cloudinary:
  cloud_name: test
  api_key: test
  api_secret: test

spring:
  datasource:
    url: jdbc:h2:mem:hrm_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: localhost
    port: 2525
    username: test
    password: test
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client
            client-secret: test-secret

