name: hrm

services:
  postgres:
    image: postgres:18-alpine
    container_name: hrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-HRM}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dodinhtrung1}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-HRM}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hrm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hrm-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override container-internal network addresses only
      DB_HOST: postgres
      DB_PORT: 5433
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "8081:8081"
      - "8443:8443"

volumes:
  postgres_data:
  redis_data: